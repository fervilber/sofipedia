<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofipedia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap');
        body { font-family: 'Quicksand', sans-serif; background-color: #e3f2fd; margin: 0; display: flex; flex-direction: column; align-items: center; color: #546e7a; }
        
        header { width: 100%; display: flex; justify-content: flex-start; padding: 20px; align-items: center; gap: 15px; }
        .logo-circle { width: 50px; height: 50px; background-color: #fff9c4; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fbc02d; }
        .logo-text { font-size: 1.5rem; font-weight: bold; color: #4fc3f7; }
        
        .nav-container { margin: 20px 0; }
        .nav-btn { padding: 12px 25px; margin: 5px; border: none; border-radius: 25px; background: #fff9c4; cursor: pointer; font-family: 'Quicksand', sans-serif; font-size: 1rem; color: #fbc02d; transition: 0.3s; }
        .nav-btn:hover { background: #fff59d; }
        
        #content { width: 90%; max-width: 900px; height: 500px; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
    </style>
</head>
<body>
    <header>
        <div class="logo-circle">S</div>
        <div class="logo-text">Sofipedia</div>
    </header>
    
    <div class="nav-container">
        <button class="nav-btn" onclick="loadContent('blog')">Mi Blog</button>
        <button class="nav-btn" onclick="loadContent('pokemon')">Pokédex</button>
        <button class="nav-btn" onclick="loadContent('sofidioma')">Sofidioma</button>
        <button class="nav-btn" onclick="loadContent('tienda')">Tienda</button>
    </div>
    
    <div id="content">Bienvenida Sofía, ¡haz clic en un botón para empezar!</div>

    <script>
        function loadContent(page) {
            const content = document.getElementById('content');
            if(page === 'pokemon') {
                content.innerHTML = '<iframe src="frontend/pokemon.html" style="width:100%; height:100%; border:none;"></iframe>';
            } else {
                content.innerHTML = '<h1>' + page.charAt(0).toUpperCase() + page.slice(1) + '</h1><p>Contenido en desarrollo...</p>';
            }
        }
    </script>
</body>
</html>
